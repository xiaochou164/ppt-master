                styleName: '清新科技风格',
                desc: 'PPT Master 项目官方介绍，展示系统架构与四大角色协作机制。',
                tags: ['官方介绍', '靛蓝渐变', '系统架构'],
                isNew: false,
                cover: 'slide_01_cover.svg'
            }
        ];

        const state = {
            filter: 'all',
            query: ''
        };

        const styleLabels = {
            all: '全部项目',
            consulting: '咨询风格',
            general: '通用灵活',
            creative: '创意风格'
        };

        function updateHeroStats() {
            document.querySelector('.stats').innerHTML = `
                <div class="stat">
                    <div class="stat-value">${projects.length}</div>
                    <div class="stat-label">示例项目</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${projects.reduce((sum, project) => sum + project.pages, 0)}</div>
                    <div class="stat-label">总页数</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${new Set(projects.map(project => project.style)).size}</div>
                    <div class="stat-label">风格分类</div>
                </div>
            `;
        }

        function getVisibleProjects() {
            const query = state.query.trim().toLowerCase();
            return projects.filter(project => {
                const matchesFilter = state.filter === 'all' || project.style === state.filter;
                if (!matchesFilter) return false;
                if (!query) return true;

                const haystack = [
                    project.title,
                    project.styleName,
                    project.desc,
                    project.tags.join(' ')
                ].join(' ').toLowerCase();
                return haystack.includes(query);
            });
        }

        function renderCatalogSummary(filtered) {
            const summary = document.getElementById('catalogSummary');
            const totalPages = filtered.reduce((sum, project) => sum + project.pages, 0);
            summary.innerHTML = `
                <span class="summary-pill">当前分类: ${styleLabels[state.filter]}</span>
                <span class="summary-pill">结果 ${filtered.length} 个</span>
                <span class="summary-pill">合计 ${totalPages} 页</span>
            `;
        }

        // Render projects
        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';

            const filtered = getVisibleProjects();
            renderCatalogSummary(filtered);

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="catalog-empty">
                        <h3>没有匹配的项目</h3>
                        <p>换个关键词，或者切回“全部项目”看看更多可复用的案例。</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => {
                    window.location.href = `viewer.html?project=${encodeURIComponent(project.id)}`;
                };

                const styleClass = project.style === 'consulting' ? 'style-consulting'
                    : project.style === 'general' ? 'style-general'
                        : 'style-creative';

                const coverUrl = encodeURI(`examples/${project.id}/svg_final/${project.cover}`);
                const img = document.createElement('img');
                img.src = coverUrl;
                img.alt = project.title;
                img.onerror = function () {
                    this.onerror = null;
                    this.parentElement.innerHTML = '<div class="placeholder">📊</div>';
                };

                card.innerHTML = `
                    <div class="card-preview">
                        ${project.isNew ? '<span class="card-badge new">🆕 新增</span>' : ''}
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${project.title}</h3>
                        <div class="card-meta">
                            <span>📄 ${project.pages} 页</span>
                            <span>🎨 ${project.styleName}</span>
                        </div>
                        <p class="card-desc">${project.desc}</p>
                        <div class="card-tags">
                            <span class="tag ${styleClass}">${project.styleName}</span>
                            ${project.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                    </div>
                `;

                // Insert image into card-preview
                const preview = card.querySelector('.card-preview');
                preview.insertBefore(img, preview.firstChild);

                grid.appendChild(card);
            });
        }

        // Filter buttons
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.filter = btn.dataset.filter;
                renderProjects();
            });
        });

        document.getElementById('projectSearchInput').addEventListener('input', (event) => {
            state.query = event.target.value;
            renderProjects();
        });

        // Initial render
        updateHeroStats();
        renderProjects();
    </script>
</body>

</html>
