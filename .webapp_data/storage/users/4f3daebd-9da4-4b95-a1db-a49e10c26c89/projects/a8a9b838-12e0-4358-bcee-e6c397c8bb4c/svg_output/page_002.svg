<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="80" fill="#1E3A5F"/>
  
  <!-- Page title -->
  <text x="60" y="52" font-family="Microsoft YaHei, SimHei, Arial" font-size="32" font-weight="bold" fill="#FFFFFF">排队论简介</text>
  
  <!-- Accent line -->
  <rect x="60" y="100" width="80" height="4" fill="#E67E22"/>
  
  <!-- Section 1: Definition -->
  <text x="60" y="150" font-family="Microsoft YaHei, SimHei, Arial" font-size="24" font-weight="bold" fill="#1E3A5F">什么是排队论？</text>
  <text x="60" y="190" font-family="Microsoft YaHei, SimSun, Arial" font-size="22" fill="#333333">排队论是运筹学与概率论的重要分支，研究"顾客到达—等待—接受服务—离开"这一随机过程。</text>
  
  <!-- Application areas -->
  <text x="60" y="260" font-family="Microsoft YaHei, SimHei, Arial" font-size="24" font-weight="bold" fill="#1E3A5F">应用领域</text>
  
  <!-- Application boxes -->
  <rect x="60" y="280" width="180" height="70" rx="8" fill="#4A90A4" fill-opacity="0.15" stroke="#4A90A4" stroke-width="2"/>
  <text x="150" y="322" font-family="Microsoft YaHei, SimSun, Arial" font-size="20" fill="#1E3A5F" text-anchor="middle">通信系统</text>
  
  <rect x="260" y="280" width="180" height="70" rx="8" fill="#4A90A4" fill-opacity="0.15" stroke="#4A90A4" stroke-width="2"/>
  <text x="350" y="322" font-family="Microsoft YaHei, SimSun, Arial" font-size="20" fill="#1E3A5F" text-anchor="middle">医院管理</text>
  
  <rect x="460" y="280" width="180" height="70" rx="8" fill="#4A90A4" fill-opacity="0.15" stroke="#4A90A4" stroke-width="2"/>
  <text x="550" y="322" font-family="Microsoft YaHei, SimSun, Arial" font-size="20" fill="#1E3A5F" text-anchor="middle">交通系统</text>
  
  <rect x="660" y="280" width="180" height="70" rx="8" fill="#4A90A4" fill-opacity="0.15" stroke="#4A90A4" stroke-width="2"/>
  <text x="750" y="322" font-family="Microsoft YaHei, SimSun, Arial" font-size="20" fill="#1E3A5F" text-anchor="middle">制造系统</text>
  
  <rect x="860" y="280" width="180" height="70" rx="8" fill="#4A90A4" fill-opacity="0.15" stroke="#4A90A4" stroke-width="2"/>
  <text x="950" y="322" font-family="Microsoft YaHei, SimSun, Arial" font-size="20" fill="#1E3A5F" text-anchor="middle">云计算</text>
  
  <!-- Key questions section -->
  <text x="60" y="400" font-family="Microsoft YaHei, SimHei, Arial" font-size="24" font-weight="bold" fill="#1E3A5F">典型研究问题</text>
  
  <!-- Question items with icons -->
  <circle cx="80" cy="445" r="8" fill="#E67E22"/>
  <text x="100" y="452" font-family="Microsoft YaHei, SimSun, Arial" font-size="22" fill="#333333">平均等待时间有多长？</text>
  
  <circle cx="80" cy="490" r="8" fill="#E67E22"/>
  <text x="100" y="497" font-family="Microsoft YaHei, SimSun, Arial" font-size="22" fill="#333333">平均队列长度是多少？</text>
  
  <circle cx="80" cy="535" r="8" fill="#E67E22"/>
  <text x="100" y="542" font-family="Microsoft YaHei, SimSun, Arial" font-size="22" fill="#333333">需要多少服务台才能避免严重拥堵？</text>
  
  <circle cx="80" cy="580" r="8" fill="#E67E22"/>
  <text x="100" y="587" font-family="Microsoft YaHei, SimSun, Arial" font-size="22" fill="#333333">如何在"服务成本"与"等待成本"之间取得平衡？</text>
  
  <!-- Flow diagram on right side -->
  <rect x="700" y="400" width="520" height="220" rx="12" fill="#F8F9FA" stroke="#1E3A5F" stroke-width="1"/>
  
  <!-- Flow boxes -->
  <rect x="720" y="420" width="100" height="50" rx="6" fill="#1E3A5F"/>
  <text x="770" y="452" font-family="Microsoft YaHei, SimSun, Arial" font-size="18" fill="#FFFFFF" text-anchor="middle">顾客到达</text>
  
  <path d="M830 445 L870 445" stroke="#4A90A4" stroke-width="3" fill="none"/>
  <polygon points="870,440 880,445 870,450" fill="#4A90A4"/>
  
  <rect x="890" y="420" width="100" height="50" rx="6" fill="#4A90A4"/>
  <text x="940" y="452" font-family="Microsoft YaHei, SimSun, Arial" font-size="18" fill="#FFFFFF" text-anchor="middle">等待</text>
  
  <path d="M1000 445 L1040 445" stroke="#4A90A4" stroke-width="3" fill="none"/>
  <polygon points="1040,440 1050,445 1040,450" fill="#4A90A4"/>
  
  <rect x="1060" y="420" width="100" height="50" rx="6" fill="#E67E22"/>
  <text x="1110" y="452" font-family="Microsoft YaHei, SimSun, Arial" font-size="18" fill="#FFFFFF" text-anchor="middle">接受服务</text>
  
  <path d="M1110 480 L1110 510 L770 510 L770 540" stroke="#4A90A4" stroke-width="3" fill="none"/>
  
  <rect x="720" y="540" width="100" height="50" rx="6" fill="#1E3A5F"/>
  <text x="770" y="572" font-family="Microsoft YaHei, SimSun, Arial" font-size="18" fill="#FFFFFF" text-anchor="middle">离开</text>
  
  <!-- Core goal text -->
  <text x="890" y="565" font-family="Microsoft YaHei, SimSun, Arial" font-size="18" fill="#1E3A5F">核心目标：性能分析与资源优化</text>
  
  <!-- Page number -->
  <text x="1240" y="700" font-family="Microsoft YaHei, Arial" font-size="16" fill="#999999" text-anchor="end">2 / 10</text>
  
  <!-- Footer line -->
  <rect x="60" y="680" width="1160" height="2" fill="#E0E0E0"/>
</svg>