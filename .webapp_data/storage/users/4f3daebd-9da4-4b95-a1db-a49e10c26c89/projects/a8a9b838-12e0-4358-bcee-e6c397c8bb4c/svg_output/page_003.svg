<svg viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="8" fill="#1E3A5F"/>
  <rect x="0" y="8" width="320" height="4" fill="#E67E22"/>
  <text x="60" y="70" font-family="Microsoft YaHei" font-size="36" font-weight="bold" fill="#1E3A5F">基本组成与记号</text>
  <line x1="60" y1="90" x2="280" y2="90" stroke="#E67E22" stroke-width="3"/>
  <rect x="60" y="120" width="540" height="260" rx="8" fill="#F8FAFC" stroke="#4A90A4" stroke-width="1"/>
  <text x="80" y="155" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#1E3A5F">排队系统的组成</text>
  <circle cx="95" cy="195" r="6" fill="#E67E22"/>
  <text x="115" y="202" font-family="Microsoft YaHei" font-size="20" fill="#333333">输入过程（到达过程）</text>
  <text x="130" y="228" font-family="Microsoft YaHei" font-size="16" fill="#666666">顾客到达方式与时间间隔分布</text>
  <circle cx="95" cy="260" r="6" fill="#E67E22"/>
  <text x="115" y="267" font-family="Microsoft YaHei" font-size="20" fill="#333333">服务机制</text>
  <text x="130" y="293" font-family="Microsoft YaHei" font-size="16" fill="#666666">服务台数量与服务时间分布</text>
  <circle cx="95" cy="325" r="6" fill="#E67E22"/>
  <text x="115" y="332" font-family="Microsoft YaHei" font-size="20" fill="#333333">排队规则</text>
  <text x="130" y="358" font-family="Microsoft YaHei" font-size="16" fill="#666666">FIFO / 优先服务 / 随机服务</text>
  <rect x="620" y="120" width="600" height="260" rx="8" fill="#F8FAFC" stroke="#4A90A4" stroke-width="1"/>
  <text x="640" y="155" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#1E3A5F">主要参数</text>
  <rect x="640" y="175" width="170" height="70" rx="6" fill="#1E3A5F"/>
  <text x="725" y="200" font-family="Microsoft YaHei" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">λ</text>
  <text x="725" y="232" font-family="Microsoft YaHei" font-size="14" fill="#FFFFFF" text-anchor="middle">到达率</text>
  <rect x="825" y="175" width="170" height="70" rx="6" fill="#4A90A4"/>
  <text x="910" y="200" font-family="Microsoft YaHei" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">μ</text>
  <text x="910" y="232" font-family="Microsoft YaHei" font-size="14" fill="#FFFFFF" text-anchor="middle">服务率</text>
  <rect x="1010" y="175" width="170" height="70" rx="6" fill="#E67E22"/>
  <text x="1095" y="200" font-family="Microsoft YaHei" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ρ</text>
  <text x="1095" y="232" font-family="Microsoft YaHei" font-size="14" fill="#FFFFFF" text-anchor="middle">系统利用率</text>
  <text x="640" y="285" font-family="Microsoft YaHei" font-size="18" fill="#333333">单服务台：</text>
  <text x="750" y="285" font-family="Microsoft YaHei" font-size="18" fill="#1E3A5F" font-weight="bold">ρ = λ / μ</text>
  <text x="640" y="320" font-family="Microsoft YaHei" font-size="18" fill="#333333">c 服务台：</text>
  <text x="750" y="320" font-family="Microsoft YaHei" font-size="18" fill="#1E3A5F" font-weight="bold">ρ = λ / (cμ)</text>
  <text x="640" y="358" font-family="Microsoft YaHei" font-size="16" fill="#666666">稳定条件：ρ &lt; 1</text>
  <rect x="60" y="400" width="1160" height="180" rx="8" fill="#1E3A5F"/>
  <text x="80" y="440" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#FFFFFF">性能指标与 Little 定律</text>
  <rect x="80" y="460" width="260" height="100" rx="6" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="210" y="495" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">L</text>
  <text x="210" y="525" font-family="Microsoft YaHei" font-size="14" fill="#FFFFFF" text-anchor="middle">平均系统人数</text>
  <text x="210" y="548" font-family="Microsoft YaHei" font-size="12" fill="#E67E22" text-anchor="middle">队列 + 服务中</text>
  <rect x="360" y="460" width="260" height="100" rx="6" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="490" y="495" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Lq</text>
  <text x="490" y="525" font-family="Microsoft YaHei" font-size="14" fill="#FFFFFF" text-anchor="middle">平均队列长度</text>
  <text x="490" y="548" font-family="Microsoft YaHei" font-size="12" fill="#E67E22" text-anchor="middle">等待中的顾客</text>
  <rect x="640" y="460" width="260" height="100" rx="6" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="770" y="495" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">W</text>
  <text x="770" y="525" font-family="Microsoft YaHei" font-size="14" fill="#FFFFFF" text-anchor="middle">平均逗留时间</text>
  <text x="770" y="548" font-family="Microsoft YaHei" font-size="12" fill="#E67E22" text-anchor="middle">等待 + 服务</text>
  <rect x="920" y="460" width="260" height="100" rx="6" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="1050" y="495" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Wq</text>
  <text x="1050" y="525" font-family="Microsoft YaHei" font-size="14" fill="#FFFFFF" text-anchor="middle">平均等待时间</text>
  <text x="1050" y="548" font-family="Microsoft YaHei" font-size="12" fill="#E67E22" text-anchor="middle">纯等待时间</text>
  <text x="640" y="610" font-family="Microsoft YaHei" font-size="18" fill="#E67E22" text-anchor="middle">Little 定律：L = λW，Lq = λWq</text>
  <text x="60" y="695" font-family="Microsoft YaHei" font-size="14" fill="#999999">Page 3 / 10</text>
  <text x="1220" y="695" font-family="Microsoft YaHei" font-size="14" fill="#999999" text-anchor="end">排队论研究讲义</text>
</svg>