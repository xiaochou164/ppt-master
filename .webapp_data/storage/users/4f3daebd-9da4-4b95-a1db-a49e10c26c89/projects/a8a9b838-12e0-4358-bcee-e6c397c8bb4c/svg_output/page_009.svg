<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="80" fill="#1E3A5F"/>
  
  <!-- Title -->
  <text x="60" y="52" font-family="Microsoft YaHei" font-size="36" font-weight="bold" fill="#FFFFFF">典型应用场景</text>
  
  <!-- Page number -->
  <text x="1220" y="52" font-family="Arial" font-size="20" fill="#FFFFFF" text-anchor="end">9 / 10</text>
  
  <!-- Accent line -->
  <rect x="60" y="100" width="100" height="4" fill="#E67E22"/>
  
  <!-- Application areas - Row 1 -->
  <!-- Hospital -->
  <rect x="60" y="130" width="350" height="140" rx="8" fill="#F8F9FA" stroke="#4A90A4" stroke-width="2"/>
  <use data-icon="hospital" x="80" y="150" width="40" height="40" fill="#E67E22"/>
  <text x="130" y="180" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#1E3A5F">医院</text>
  <text x="80" y="220" font-family="Microsoft YaHei" font-size="18" fill="#333333">• 门诊候诊时间估计</text>
  <text x="80" y="250" font-family="Microsoft YaHei" font-size="18" fill="#333333">• 医生与诊室数量配置</text>
  
  <!-- Communication -->
  <rect x="465" y="130" width="350" height="140" rx="8" fill="#F8F9FA" stroke="#4A90A4" stroke-width="2"/>
  <use data-icon="network" x="485" y="150" width="40" height="40" fill="#E67E22"/>
  <text x="535" y="180" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#1E3A5F">通信与网络</text>
  <text x="485" y="220" font-family="Microsoft YaHei" font-size="18" fill="#333333">• 分析拥塞、延迟、吞吐</text>
  <text x="485" y="250" font-family="Microsoft YaHei" font-size="18" fill="#333333">• 丢包概率评估</text>
  
  <!-- Cloud Computing -->
  <rect x="870" y="130" width="350" height="140" rx="8" fill="#F8F9FA" stroke="#4A90A4" stroke-width="2"/>
  <use data-icon="cloud" x="890" y="150" width="40" height="40" fill="#E67E22"/>
  <text x="940" y="180" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#1E3A5F">云计算与数据中心</text>
  <text x="890" y="220" font-family="Microsoft YaHei" font-size="18" fill="#333333">• 请求延迟预测</text>
  <text x="890" y="250" font-family="Microsoft YaHei" font-size="18" fill="#333333">• 虚拟机扩缩容策略</text>
  
  <!-- Application areas - Row 2 -->
  <!-- Traffic -->
  <rect x="60" y="290" width="350" height="140" rx="8" fill="#F8F9FA" stroke="#4A90A4" stroke-width="2"/>
  <use data-icon="car" x="80" y="310" width="40" height="40" fill="#E67E22"/>
  <text x="130" y="340" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#1E3A5F">交通系统</text>
  <text x="80" y="380" font-family="Microsoft YaHei" font-size="18" fill="#333333">• 收费站通行效率分析</text>
  <text x="80" y="410" font-family="Microsoft YaHei" font-size="18" fill="#333333">• 信号灯优化设计</text>
  
  <!-- Manufacturing -->
  <rect x="465" y="290" width="350" height="140" rx="8" fill="#F8F9FA" stroke="#4A90A4" stroke-width="2"/>
  <use data-icon="factory" x="485" y="310" width="40" height="40" fill="#E67E22"/>
  <text x="535" y="340" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#1E3A5F">制造业与维修系统</text>
  <text x="485" y="380" font-family="Microsoft YaHei" font-size="18" fill="#333333">• 机器维修队列管理</text>
  <text x="485" y="410" font-family="Microsoft YaHei" font-size="18" fill="#333333">• 备件数量优化</text>
  
  <!-- Case Study Box -->
  <rect x="60" y="460" width="1160" height="220" rx="10" fill="#1E3A5F" fill-opacity="0.08" stroke="#1E3A5F" stroke-width="2"/>
  
  <!-- Case study header -->
  <rect x="60" y="460" width="1160" height="45" rx="10" fill="#1E3A5F"/>
  <rect x="60" y="485" width="1160" height="20" fill="#1E3A5F"/>
  <text x="80" y="492" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#FFFFFF">案例：维修系统优化</text>
  
  <!-- Case study content -->
  <text x="80" y="545" font-family="Microsoft YaHei" font-size="20" fill="#1E3A5F" font-weight="bold">问题背景：</text>
  <text x="180" y="545" font-family="Microsoft YaHei" font-size="18" fill="#333333">机器到达率 λ = 42 台/天，每台维修员服务率 μ = 20 台/天</text>
  
  <text x="80" y="585" font-family="Microsoft YaHei" font-size="20" fill="#1E3A5F" font-weight="bold">分析方法：</text>
  <text x="180" y="585" font-family="Microsoft YaHei" font-size="18" fill="#333333">使用 M/M/c 模型比较不同维修员数量下的等待损失与人工成本</text>
  
  <text x="80" y="625" font-family="Microsoft YaHei" font-size="20" fill="#1E3A5F" font-weight="bold">优化目标：</text>
  <text x="180" y="625" font-family="Microsoft YaHei" font-size="18" fill="#333333">选择总成本最小的配置方案</text>
  
  <!-- Formula highlight -->
  <rect x="870" y="520" width="330" height="130" rx="6" fill="#E67E22" fill-opacity="0.15" stroke="#E67E22" stroke-width="1"/>
  <text x="885" y="555" font-family="Microsoft YaHei" font-size="16" fill="#E67E22" font-weight="bold">核心决策变量：</text>
  <text x="885" y="590" font-family="Microsoft YaHei" font-size="18" fill="#333333">服务台数量 c</text>
  <text x="885" y="620" font-family="Microsoft YaHei" font-size="18" fill="#333333">等待成本 vs 服务成本</text>
  <text x="885" y="650" font-family="Microsoft YaHei" font-size="16" fill="#4A90A4">min{总成本} = f(c, λ, μ)</text>
  
  <!-- Decorative elements -->
  <circle cx="1220" y="700" r="80" fill="#4A90A4" fill-opacity="0.1"/>
  <circle cx="1260" y="680" r="50" fill="#E67E22" fill-opacity="0.1"/>
</svg>