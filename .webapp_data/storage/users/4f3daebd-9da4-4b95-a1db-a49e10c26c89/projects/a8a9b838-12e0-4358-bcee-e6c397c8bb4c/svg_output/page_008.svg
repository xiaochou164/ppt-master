<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="80" fill="#1E3A5F"/>
  
  <!-- Title -->
  <text x="60" y="52" font-family="Microsoft YaHei" font-size="32" font-weight="bold" fill="#FFFFFF">学习路线建议</text>
  
  <!-- Subtitle -->
  <text x="280" y="52" font-family="Microsoft YaHei" font-size="20" fill="#4A90A4">Learning Path Recommendations</text>
  
  <!-- Page number -->
  <text x="1220" y="52" font-family="Arial" font-size="18" fill="#FFFFFF" text-anchor="end">8 / 10</text>
  
  <!-- Step 1 -->
  <rect x="60" y="110" width="560" height="85" rx="8" fill="#1E3A5F" fill-opacity="0.08"/>
  <circle cx="100" cy="152" r="24" fill="#E67E22"/>
  <text x="100" y="160" font-family="Arial" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="140" y="142" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#1E3A5F">打好基础</text>
  <text x="140" y="172" font-family="Microsoft YaHei" font-size="18" fill="#555555">泊松过程、指数分布、马尔可夫链、生灭过程等概率知识</text>
  
  <!-- Step 2 -->
  <rect x="660" y="110" width="560" height="85" rx="8" fill="#1E3A5F" fill-opacity="0.08"/>
  <circle cx="700" cy="152" r="24" fill="#E67E22"/>
  <text x="700" y="160" font-family="Arial" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="740" y="142" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#1E3A5F">掌握经典模型</text>
  <text x="740" y="172" font-family="Microsoft YaHei" font-size="18" fill="#555555">M/M/1、M/M/c、M/G/1 的稳态分析与性能指标计算</text>
  
  <!-- Step 3 -->
  <rect x="60" y="215" width="560" height="85" rx="8" fill="#1E3A5F" fill-opacity="0.08"/>
  <circle cx="100" cy="257" r="24" fill="#E67E22"/>
  <text x="100" y="265" font-family="Arial" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="140" y="247" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#1E3A5F">使用 Little 定律</text>
  <text x="140" y="277" font-family="Microsoft YaHei" font-size="18" fill="#555555">熟练在 L, Lq, W, Wq 之间进行转换</text>
  
  <!-- Step 4 -->
  <rect x="660" y="215" width="560" height="85" rx="8" fill="#1E3A5F" fill-opacity="0.08"/>
  <circle cx="700" cy="257" r="24" fill="#E67E22"/>
  <text x="700" y="265" font-family="Arial" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="740" y="247" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#1E3A5F">研究系统优化</text>
  <text x="740" y="277" font-family="Microsoft YaHei" font-size="18" fill="#555555">服务台数量选择、成本最小化与服务水平设计</text>
  
  <!-- Step 5 -->
  <rect x="60" y="320" width="560" height="85" rx="8" fill="#1E3A5F" fill-opacity="0.08"/>
  <circle cx="100" cy="362" r="24" fill="#E67E22"/>
  <text x="100" y="370" font-family="Arial" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="140" y="352" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#1E3A5F">深入现代方向</text>
  <text x="140" y="382" font-family="Microsoft YaHei" font-size="18" fill="#555555">排队网络、多类顾客、优先级、复杂调度与非马尔可夫过程</text>
  
  <!-- Step 6 -->
  <rect x="660" y="320" width="560" height="85" rx="8" fill="#1E3A5F" fill-opacity="0.08"/>
  <circle cx="700" cy="362" r="24" fill="#E67E22"/>
  <text x="700" y="370" font-family="Arial" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6</text>
  <text x="740" y="352" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#1E3A5F">结合仿真与实际案例</text>
  <text x="740" y="382" font-family="Microsoft YaHei" font-size="18" fill="#555555">使用仿真工具（Python、MATLAB）分析实际排队系统</text>
  
  <!-- Connecting arrows -->
  <path d="M620 152 L650 152" stroke="#4A90A4" stroke-width="3" fill="none"/>
  <polygon points="650,152 640,147 640,157" fill="#4A90A4"/>
  
  <path d="M340 195 L340 210" stroke="#4A90A4" stroke-width="3" fill="none"/>
  <polygon points="340,210 335,200 345,200" fill="#4A90A4"/>
  
  <path d="M940 195 L940 210" stroke="#4A90A4" stroke-width="3" fill="none"/>
  <polygon points="940,210 935,200 945,200" fill="#4A90A4"/>
  
  <path d="M620 257 L650 257" stroke="#4A90A4" stroke-width="3" fill="none"/>
  <polygon points="650,257 640,252 640,262" fill="#4A90A4"/>
  
  <path d="M340 300 L340 315" stroke="#4A90A4" stroke-width="3" fill="none"/>
  <polygon points="340,315 335,305 345,305" fill="#4A90A4"/>
  
  <path d="M940 300 L940 315" stroke="#4A90A4" stroke-width="3" fill="none"/>
  <polygon points="940,315 935,305 945,305" fill="#4A90A4"/>
  
  <path d="M620 362 L650 362" stroke="#4A90A4" stroke-width="3" fill="none"/>
  <polygon points="650,362 640,357 640,367" fill="#4A90A4"/>
  
  <!-- Bottom summary box -->
  <rect x="60" y="440" width="1160" height="240" rx="10" fill="#1E3A5F" fill-opacity="0.05" stroke="#4A90A4" stroke-width="2"/>
  
  <!-- Summary title -->
  <text x="100" y="480" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#1E3A5F">学习要点总结</text>
  
  <!-- Summary content - Left column -->
  <rect x="100" y="500" width="12" height="12" rx="2" fill="#E67E22"/>
  <text x="125" y="514" font-family="Microsoft YaHei" font-size="20" fill="#333333">理论基础：概率论、随机过程、马尔可夫链</text>
  
  <rect x="100" y="540" width="12" height="12" rx="2" fill="#E67E22"/>
  <text x="125" y="554" font-family="Microsoft YaHei" font-size="20" fill="#333333">核心模型：M/M/1、M/M/c、M/G/1 稳态分析</text>
  
  <rect x="100" y="580" width="12" height="12" rx="2" fill="#E67E22"/>
  <text x="125" y="594" font-family="Microsoft YaHei" font-size="20" fill="#333333">关键定律：Little 定律连接 L, Lq, W, Wq</text>
  
  <!-- Summary content - Right column -->
  <rect x="660" y="500" width="12" height="12" rx="2" fill="#E67E22"/>
  <text x="685" y="514" font-family="Microsoft YaHei" font-size="20" fill="#333333">优化目标：成本最小化、服务水平设计</text>
  
  <rect x="660" y="540" width="12" height="12" rx="2" fill="#E67E22"/>
  <text x="685" y="554" font-family="Microsoft YaHei" font-size="20" fill="#333333">现代方向：排队网络、多类顾客、复杂调度</text>
  
  <rect x="660" y="580" width="12" height="12" rx="2" fill="#E67E22"/>
  <text x="685" y="594" font-family="Microsoft YaHei" font-size="20" fill="#333333">实践工具：Python、MATLAB、离散事件仿真</text>
  
  <!-- Bottom accent line -->
  <rect x="60" y="640" width="1160" height="4" rx="2" fill="#4A90A4"/>
  
  <!-- Decorative element -->
  <circle cx="1200" cy="680" r="25" fill="#E67E22" fill-opacity="0.15"/>
  <circle cx="1200" cy="680" r="15" fill="#E67E22" fill-opacity="0.3"/>
</svg>